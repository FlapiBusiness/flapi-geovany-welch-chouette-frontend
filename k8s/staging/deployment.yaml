apiVersion: apps/v1
kind: Deployment
metadata:
  name: staging-geovany-welch-chouette-frontend-deployment
  namespace: staging-geovany-welch-chouette-frontend
  labels:
    app: staging-geovany-welch-chouette-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: staging-geovany-welch-chouette-frontend
  template:
    metadata:
      labels:
        app: staging-geovany-welch-chouette-frontend
    spec:
      containers:
        - name: staging-geovany-welch-chouette-frontend
          image: corentin35/geovany-welch-chouette-frontend:staging-${TAG_VERSION}
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: '400m'
              memory: '512Mi'
            limits:
              cpu: '800m'
              memory: '1Gi'
      imagePullSecrets:
        - name: regcred
